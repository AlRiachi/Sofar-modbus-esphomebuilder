text_sensor:
  - platform: template
    name: "SOFAR System State"
    id: sofar_system_state_text
    lambda: |-
      if (isnan(id(sofar_system_state_code).state)) {
        return {"Unknown"};
      }

      int state = (int) id(sofar_system_state_code).state;

      switch (state) {
        case 0:
          return {"Wait"};
        case 1:
          return {"Check"};
        case 2:
          return {"On Grid"};
        case 3:
          return {"EPS"};
        case 4:
          return {"Error"};
        case 5:
          return {"Permanent Error"};
        case 6:
          return {"Firmware Updating"};
        case 7:
          return {"Self Charging"};
        default:
          return {"Unknown"};
      }
    update_interval: 10s
