# Wiring:
# NodeMCU D7 / GPIO13  -> MAX485 DI
# NodeMCU D6 / GPIO12  <- MAX485 RO
# NodeMCU D5 / GPIO14  -> MAX485 DE + RE
# NodeMCU G            -> MAX485 GND
# NodeMCU 3V/VIN       -> MAX485 VCC, according to your module
#
# MAX485 A             -> SOFAR Pin 5
# MAX485 B             -> SOFAR Pin 6

uart:
  id: uart_sofar
  tx_pin: GPIO13
  rx_pin: GPIO12
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  debug:
    direction: BOTH
    dummy_receiver: false

modbus:
  id: modbus_sofar
  uart_id: uart_sofar
  flow_control_pin: GPIO14
  send_wait_time: 1000ms

modbus_controller:
  - id: sofar_inverter
    address: 0x01
    modbus_id: modbus_sofar
    setup_priority: -10
    update_interval: 10s
    command_throttle: 500ms
    max_cmd_retries: 1

sensor:
  # =========================
  # System / Status
  # =========================

  - platform: modbus_controller
    modbus_controller_id: sofar_inverter
